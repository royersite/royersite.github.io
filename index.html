        <script>
            // Marcar el inicio de la carga lo más temprano posible
            performance.mark('inicioCarga');

            // Cuando toda la página termine de cargar
            window.addEventListener('load', () => {
                // Marcar el final de la carga
                performance.mark('finCarga');

                // Medir el tiempo total de carga
                performance.measure('tiempoTotalCarga', 'inicioCarga', 'finCarga');

                // Obtener la medida
                const medida = performance.getEntriesByName('tiempoTotalCarga')[0];

                // Mostrar en consola
                console.log(`La página tardó ${medida.duration.toFixed(2)} ms en cargarse`);
            });
        </script>

        <script>
            const colores = ["#E60834", "#F3571A", "#FFA500", "#8BD428", "#38D878", "#8A2BE2", "#6A45EE", "#4A5DF9"];
            const colorAleatorio = colores[Math.floor(Math.random() * colores.length)];
        
            document.documentElement.style.backgroundColor = colorAleatorio;
            //document.documentElement.style.setProperty('--base-color', colorAleatorio); Sin uso, funciona para daler color bg igual que el body
        
            const metaThemeColor = document.querySelector('meta[name="theme-color"]');
            if (metaThemeColor) {
                metaThemeColor.setAttribute('content', colorAleatorio);
            }
        
            // Crear un <style> dinámicamente sin bloquear la carga
            const style = document.createElement("style");
            style.textContent = `
                #loaderBg { background-color: ${colorAleatorio}; }
                #bodyBg { background-color: ${colorAleatorio}; }
                #overlay { background-color: ${colorAleatorio}; }
                #linkColor { color: ${colorAleatorio}; }
                #iconColor { stroke: ${colorAleatorio}; }
            `;
            document.head.appendChild(style);
        </script>

        <script>
            const loader = document.querySelector('.loaderScreen');
            const span = loader.querySelector('.loaderText');

            // Esperamos a que termine la animación del span
            span.addEventListener('animationend', () => {
                // Inicia fade-out del loader
                loader.style.opacity = '0';

                // Esperamos a que termine la transición de opacidad antes de ocultar
                loader.addEventListener('transitionend', () => {
                    loader.style.display = 'none';
                }, { once: true });
            });
        </script>
